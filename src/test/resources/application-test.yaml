spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: DA09229F-B779-48E4-ABBC-CA0AD454FA19
  access-expiration: 900000
  refresh-expiration: 604800000

server:
  port: 8080
  shutdown: graceful
  tomcat:
    connection-timeout: 20000
    keep-alive-timeout: 60000
    threads:
      max: 200
      min-spare: 10
  max-http-request-header-size: 16KB